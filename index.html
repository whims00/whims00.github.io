<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whims Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: #222222;
      --green: #3ddc84;
      --green-dim: #2ab86a;
      --green-glow: rgba(61, 220, 132, 0.12);
      --text: #f0f0f0;
      --muted: #777;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--black);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 0 40px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(8,8,8,0.96);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--green); }

    .header-pill {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--green);
      background: var(--green-glow);
      border: 1px solid rgba(61,220,132,0.25);
      padding: 5px 14px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .hero {
      padding: 72px 40px 52px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: -80px;
      left: -60px;
      width: 500px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(61,220,132,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 18px;
    }

    .live-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      font-weight: 800;
      line-height: 1.04;
      letter-spacing: -2.5px;
      max-width: 720px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--green);
    }

    .hero p {
      margin-top: 18px;
      font-size: 1rem;
      color: var(--muted);
      max-width: 460px;
      line-height: 1.65;
    }

    .search-wrap {
      padding: 0 40px;
      margin-top: 36px;
    }

    .search-box {
      position: relative;
      max-width: 480px;
    }

    .search-box input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      padding: 13px 18px 13px 46px;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box input:focus {
      border-color: rgba(61,220,132,0.5);
      box-shadow: 0 0 0 3px rgba(61,220,132,0.08);
    }

    .search-box input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }

    .section-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 48px 40px 20px;
    }

    .section-bar h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .badge {
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 20px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 14px;
      padding: 0 40px 80px;
    }

    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.22s ease, border-color 0.22s, box-shadow 0.22s;
    }

    .game-card:hover {
      transform: translateY(-5px);
      border-color: rgba(61,220,132,0.35);
      box-shadow: 0 16px 48px rgba(0,0,0,0.55), 0 0 0 1px rgba(61,220,132,0.08);
    }

    .card-thumb {
      width: 100%;
      height: 155px;
      object-fit: cover;
      display: block;
      background: var(--surface2);
      transition: filter 0.22s;
    }

    .game-card:hover .card-thumb {
      filter: brightness(1.05);
    }

    .card-body {
      padding: 14px 16px 16px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .play-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--green);
      color: #000;
      font-weight: 700;
      font-size: 0.78rem;
      padding: 7px 14px;
      border-radius: 8px;
      transition: background 0.2s, transform 0.15s;
    }

    .game-card:hover .play-btn {
      background: var(--green-dim);
      transform: scale(1.03);
    }

    .no-results {
      display: none;
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .no-results .emoji { font-size: 2.5rem; margin-bottom: 14px; }

    footer {
      border-top: 1px solid var(--border);
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .footer-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--text);
    }

    .footer-logo span { color: var(--green); }

    @media (max-width: 600px) {
      header, .hero, .search-wrap, .section-bar, .game-grid, footer {
        padding-left: 20px;
        padding-right: 20px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Whims<span>Games</span></div>
    <div class="header-pill">Unblocked · Free</div>
  </header>

  <section class="hero">
    <div class="live-dot">Playing now</div>
    <h1>Games for when<br>you're <em>bored.</em></h1>
    <p>A curated collection of unblocked games — play anything, anytime, no hassle.</p>
  </section>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search games…" oninput="filterGames()">
    </div>
  </div>

  <div class="section-bar">
    <h2>All Games</h2>
    <span class="badge" id="game-count">0 games</span>
  </div>

  <div class="game-grid" id="game-list">
    <div class="no-results" id="no-results">
      <div class="emoji">🕹️</div>
      <div>No games found.</div>
    </div>
  </div>

  <footer>
    <div class="footer-logo">Whims<span>Games</span></div>
    <div>© 2025 WhimsGames</div>
  </footer>

  <script src="games.js"></script>
  <script>
    let allCards = [];

    window.onload = function () {
      const container = document.getElementById("game-list");
      const countEl = document.getElementById("game-count");
      countEl.textContent = `${gamesList.length} games`;

      gamesList.forEach(game => {
        const a = document.createElement("a");
        a.className = "game-card";
        a.href = game.link;
        if (game.external) a.target = "_blank";
        a.dataset.title = game.title.toLowerCase();

        a.innerHTML = `
          <img class="card-thumb" src="${game.img}" alt="${game.title}" onerror="this.style.background='#1a1a1a'">
          <div class="card-body">
            <div class="card-title">${game.title}</div>
            <div class="card-desc">${game.desc}</div>
            <span class="play-btn">▶ Play Now</span>
          </div>
        `;

        container.appendChild(a);
        allCards.push(a);
      });
    };

    function filterGames() {
      const query = document.getElementById("search-input").value.toLowerCase();
      let visible = 0;
      allCards.forEach(card => {
        const match = card.dataset.title.includes(query);
        card.style.display = match ? "block" : "none";
        if (match) visible++;
      });
      document.getElementById("game-count").textContent = `${visible} games`;
      document.getElementById("no-results").style.display = visible === 0 ? "block" : "none";
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <script src="auth.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play Stealing the Diamond — Whims Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:#080808;--surface:#111;--surface2:#181818;--border:#222;
      --green:#3ddc84;--green-dim:#2ab86a;--green-glow:rgba(61,220,132,.12);
      --text:#f0f0f0;--muted:#777;--accent:#ff3f3f;--gold:#f5c542;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:row;}
    /* ── MAIN ── */
    .main{flex:1 1 0;min-width:0;display:flex;flex-direction:column;height:100vh;padding:12px 12px 12px 14px;gap:10px;}
    .game-wrapper{flex:1 1 0;min-height:0;position:relative;background:#000;border-radius:14px;border:1px solid var(--border);overflow:hidden;}
    .game-wrapper iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
    /* Stats bar on top of game */
    .stats-bar{position:absolute;top:10px;left:10px;display:flex;gap:8px;z-index:10;pointer-events:none;}
    .stat-pill{background:rgba(8,8,8,.85);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px);border-radius:20px;padding:5px 12px;font-size:.7rem;font-weight:600;display:flex;align-items:center;gap:5px;}
    .stat-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    /* Game bar */
    .game-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px;flex-shrink:0;gap:10px;}
    .game-bar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .game-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;}
    .tags{display:flex;gap:5px;flex-wrap:wrap;}
    .tag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:20px;background:rgba(61,220,132,.08);border:1px solid rgba(61,220,132,.18);color:var(--green);}
    .bar-btns{display:flex;gap:8px;}
    .btn-fs{background:var(--green);color:#000;border:none;padding:7px 16px;font-size:.8rem;font-family:'DM Sans',sans-serif;font-weight:700;border-radius:8px;cursor:pointer;transition:all .15s;}
    .btn-fs:hover{background:var(--green-dim);transform:scale(1.03);}
    .btn-fav{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:7px 12px;font-size:.8rem;font-family:'DM Sans',sans-serif;font-weight:600;border-radius:8px;cursor:pointer;transition:all .15s;}
    .btn-fav:hover{border-color:var(--gold);color:var(--gold);}
    .btn-fav.on{border-color:var(--gold);color:var(--gold);background:rgba(245,197,66,.08);}
    /* ── SIDEBAR ── */
    .sidebar{width:264px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;height:100vh;}
    .sidebar::-webkit-scrollbar{width:3px;}
    .sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    .back-btn{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);color:var(--text);text-decoration:none;font-weight:600;font-size:.8rem;padding:8px 14px;border-radius:9px;transition:all .15s;flex-shrink:0;}
    .back-btn:hover{border-color:rgba(61,220,132,.4);background:#1a1a1a;}
    .sidebar-label{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
    /* Session stats */
    .session-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;}
    .session-title{font-family:'Syne',sans-serif;font-size:.78rem;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:.06em;}
    .session-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .ss{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:8px 10px;}
    .ss-val{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);line-height:1;}
    .ss-lab{font-size:.6rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:3px;}
    /* Mini game cards */
    .game-card{display:block;text-decoration:none;color:inherit;background:var(--surface2);border:1px solid var(--border);border-radius:11px;overflow:hidden;transition:transform .18s,border-color .18s;}
    .game-card:hover{transform:translateY(-2px);border-color:rgba(61,220,132,.28);}
    .game-card img{width:100%;height:96px;object-fit:cover;display:block;background:#111;}
    .card-info{padding:9px 11px 11px;}
    .card-info h3{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:800;margin-bottom:3px;}
    .card-info p{font-size:.7rem;color:var(--muted);line-height:1.4;}
    /* Rating */
    .rating-row{display:flex;align-items:center;gap:6px;}
    .star{font-size:1.2rem;cursor:pointer;color:var(--border);transition:color .1s;user-select:none;}
    .star.lit{color:var(--gold);}
    .rating-label{font-size:.72rem;color:var(--muted);}
    /* Divider */
    .divider{height:1px;background:var(--border);}
  </style>
</head>
<body>
  <div class="main" id="mainContainer">
    <div class="game-wrapper">
      <iframe id="gameFrame" src="https://3kh0s.github.io/games/stealingthediamond/index.html" allowfullscreen allow="autoplay; fullscreen"></iframe>
      <div class="stats-bar">
        <div class="stat-pill"><span class="dot"></span><span id="playerCount">— playing</span></div>
        <div class="stat-pill">⏱ <span id="sessionTime">0:00</span></div>
      </div>
    </div>
    <div class="game-bar">
      <div class="game-bar-left">
        <span class="game-title">Stealing the Diamond</span>
        <div class="tags"><span class="tag">action</span><span class="tag">story</span></div>
      </div>
      <div class="bar-btns">
        <button class="btn-fav" id="favBtn" onclick="toggleFav()">☆ Favourite</button>
        <button class="btn-fs" onclick="goFullscreen()">⛶ Fullscreen</button>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div id="headerNav" style="margin-bottom:2px"></div>
    <a href="index.html" class="back-btn">← Home</a>

    <div class="session-card">
      <div class="session-title">📊 Session</div>
      <div class="session-stats">
        <div class="ss"><div class="ss-val" id="st-time">0:00</div><div class="ss-lab">Time Played</div></div>
        <div class="ss"><div class="ss-val" id="st-visits">—</div><div class="ss-lab">Your Visits</div></div>
        <div class="ss"><div class="ss-val" id="st-total">—</div><div class="ss-lab">Total Plays</div></div>
        <div class="ss"><div class="ss-val" id="st-rank">—</div><div class="ss-lab">Popularity</div></div>
      </div>
      <div class="divider"></div>
      <div class="session-title" style="font-size:.72rem;color:var(--muted)">Rate this game</div>
      <div class="rating-row">
        <span class="star" data-v="1" onclick="rateGame(1)">★</span>
        <span class="star" data-v="2" onclick="rateGame(2)">★</span>
        <span class="star" data-v="3" onclick="rateGame(3)">★</span>
        <span class="star" data-v="4" onclick="rateGame(4)">★</span>
        <span class="star" data-v="5" onclick="rateGame(5)">★</span>
        <span class="rating-label" id="ratingLabel">Not rated</span>
      </div>
    </div>

    <div class="divider"></div>
    <div class="sidebar-label">More Games</div>
    <div id="random-games"></div>
  </div>

  <script src="tracking.js"></script>
  <script src="games.js"></script>
  <script>
    const GAME_ID = 'StealingDiamond';
    const GAME_TITLE = 'Stealing the Diamond';

    // ── SESSION TIMER ──
    let sessionSec = 0;
    function fmt(s){const m=Math.floor(s/60);return m+':'+(s%60<10?'0':'')+s%60;}
    setInterval(()=>{
      sessionSec++;
      document.getElementById('sessionTime').textContent = fmt(sessionSec);
      document.getElementById('st-time').textContent = fmt(sessionSec);
    }, 1000);

    // ── PLAYER COUNT ──
    function updateCount(){
      const c = typeof getPageCount==='function'?getPageCount(GAME_ID):0;
      document.getElementById('playerCount').textContent = c>0?c+' playing':'— playing';
      document.getElementById('st-total').textContent = c||'—';
    }
    updateCount();setInterval(updateCount,5000);

    // ── VISIT TRACKING ──
    const vKey='wg_visits_'+GAME_ID;
    const visits=(+localStorage.getItem(vKey)||0)+1;
    localStorage.setItem(vKey,visits);
    document.getElementById('st-visits').textContent=visits;

    // ── FAVOURITES ──
    const favKey='wg_fav_'+GAME_ID;
    function updateFavBtn(){
      const on=localStorage.getItem(favKey)==='1';
      const b=document.getElementById('favBtn');
      b.textContent=on?'★ Favourited':'☆ Favourite';
      b.classList.toggle('on',on);
    }
    function toggleFav(){
      const on=localStorage.getItem(favKey)==='1';
      localStorage.setItem(favKey,on?'0':'1');
      updateFavBtn();
    }
    updateFavBtn();

    // ── RATING ──
    const rKey='wg_rate_'+GAME_ID;
    function rateGame(v){
      localStorage.setItem(rKey,v);
      document.querySelectorAll('.star').forEach(s=>s.classList.toggle('lit',+s.dataset.v<=v));
      document.getElementById('ratingLabel').textContent=['','Poor','OK','Good','Great','Amazing'][v];
    }
    const savedRating=+localStorage.getItem(rKey)||0;
    if(savedRating)rateGame(savedRating);

    // ── POPULARITY RANK ──
    const allCounts=gamesList.map(g=>typeof getPageCount==='function'?getPageCount(g.title):0);
    const myCount=typeof getPageCount==='function'?getPageCount(GAME_ID):0;
    const rank=allCounts.filter(c=>c>myCount).length+1;
    document.getElementById('st-rank').textContent='#'+rank;

    // ── FULLSCREEN ──
    function goFullscreen(){
      const c=document.getElementById('mainContainer');
      if(!document.fullscreenElement)c.requestFullscreen().catch(()=>{});
      else document.exitFullscreen();
    }

    // ── SIDEBAR GAME CARDS ──
    const container=document.getElementById('random-games');
    const others=gamesList.filter(g=>g.title!==GAME_TITLE).sort(()=>.5-Math.random()).slice(0,7);
    others.forEach(game=>{
      const a=document.createElement('a');
      a.href=game.link;a.className='game-card';
      if(game.external)a.target='_blank';
      a.innerHTML=`<img src="${game.img}" alt="${game.title}" onerror="this.style.background='#1a1a1a'"><div class="card-info"><h3>${game.title}</h3><p>${game.desc}</p></div>`;
      container.appendChild(a);
    });

    // ── AUTH + KEYBINDS ──
    if(window.injectAuthNav)injectAuthNav(document.getElementById('headerNav'));
    if(window.initGlobalKeybinds)initGlobalKeybinds(()=>{window.location.href='tools.html';},null);
    if(window.trackPage)trackPage(GAME_ID);
    if(window.checkFunnyMode)checkFunnyMode();
  </script>
  <script src="chat-widget.js"></script>
</body>
</html>

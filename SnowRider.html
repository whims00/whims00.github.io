<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play Snow Rider 3D — Whims Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: #222222;
      --green: #3ddc84;
      --green-dim: #2ab86a;
      --green-glow: rgba(61, 220, 132, 0.12);
      --text: #f0f0f0;
      --muted: #777;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      background-color: var(--black);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: grid;
      grid-template-columns: 1fr 290px;
      height: 100vh;
      overflow: hidden;
    }

    /* MAIN */
    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 16px;
      box-sizing: border-box;
      gap: 10px;
    }

    .game-wrapper {
      flex-grow: 1;
      min-height: 0;
      background-color: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    iframe, canvas {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #unity-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      flex-shrink: 0;
    }

    .game-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .game-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .game-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .fullscreen-btn {
      background: var(--green);
      color: #000;
      border: none;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .fullscreen-btn:hover {
      background: var(--green-dim);
      transform: scale(1.03);
    }

    .game-warning {
      background: rgba(61,220,132,0.1);
      border: 1px solid rgba(61,220,132,0.25);
      color: var(--green);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 500;
      flex-shrink: 0;
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.82rem;
      padding: 9px 16px;
      border-radius: 10px;
      transition: border-color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      border-color: rgba(61,220,132,0.4);
      background: #1a1a1a;
    }

    .sidebar-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .game-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }

    .game-card:hover {
      transform: translateY(-3px);
      border-color: rgba(61,220,132,0.3);
    }

    .game-card img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 10px 12px 12px;
    }

    .card-info h3 {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-info p {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.4;
    }
</style>
</head>
<body>

  <div class="main" id="mainContainer">
    
    <div class="game-wrapper">
      <iframe src="https://23azostore.github.io/s8/snow-rider-3d/" allowfullscreen></iframe>
    </div>
    <div class="game-bar">
      <div class="game-bar-left">
        <div class="game-dot"></div>
        <span class="game-title">Snow Rider 3D</span>
      </div>
      <button id="fullscreen-btn" class="fullscreen-btn">⛶ Fullscreen</button>
    </div>
  </div>

  <div class="sidebar">
    <a href="index.html" class="back-btn">← Home</a>
    <div class="sidebar-label">More Games</div>
    <div id="random-games"></div>
  </div>

  <script src="games.js"></script>
  
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById("random-games");
      const filtered = gamesList.filter(g => g.title !== "Snow Rider 3D");
      const shuffled = filtered.sort(() => 0.5 - Math.random());
      shuffled.slice(0, 6).forEach(game => {
        const a = document.createElement("a");
        a.href = game.link;
        a.className = "game-card";
        if (game.external) a.target = "_blank";
        a.innerHTML = `
          <img src="${game.img}" alt="${game.title}" onerror="this.style.background='#1a1a1a'">
          <div class="card-info">
            <h3>${game.title}</h3>
            <p>${game.desc}</p>
          </div>
        `;
        container.appendChild(a);
      });
    });

    document.getElementById("fullscreen-btn").addEventListener("click", () => {
      const c = document.getElementById("mainContainer");
      if (!document.fullscreenElement) {
        c.requestFullscreen().catch(err => alert(err.message));
      } else {
        document.exitFullscreen();
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verified — Whims Games</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root{--black:#080808;--surface:#111;--surface2:#181818;--border:#222;--green:#3ddc84;--green-dim:#2ab86a;--green-glow:rgba(61,220,132,0.12);--text:#f0f0f0;--muted:#666;--red:#ff5e5e;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
    .bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
    .particle{position:absolute;border-radius:50%;opacity:0;animation:float linear infinite;}
    @keyframes float{0%{transform:translateY(100vh);opacity:0;}10%{opacity:0.5;}90%{opacity:0.15;}100%{transform:translateY(-100px) translateX(30px);opacity:0;}}
    .card{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 40px;text-align:center;position:relative;z-index:1;animation:cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
    @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(0.95)}to{opacity:1;transform:none}}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--muted);margin-bottom:32px;}
    .logo span{color:var(--green);}
    .spinner{width:72px;height:72px;border-radius:50%;margin:0 auto 24px;border:2px solid var(--border);border-top-color:var(--green);animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .icon-wrap{width:72px;height:72px;border-radius:50%;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:2rem;}
    .icon-wrap.success{background:var(--green-glow);border:1px solid rgba(61,220,132,0.3);color:var(--green);animation:pop 0.5s cubic-bezier(0.34,1.56,0.64,1);}
    .icon-wrap.error{background:rgba(255,80,80,0.08);border:1px solid rgba(255,80,80,0.2);color:var(--red);}
    @keyframes pop{from{transform:scale(0.4);opacity:0}to{transform:scale(1);opacity:1}}
    h1{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:10px;}
    .sub{font-size:0.88rem;color:var(--muted);line-height:1.65;margin-bottom:24px;}
    .username{color:var(--green);font-weight:600;}
    .checks{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;text-align:left;}
    .ci{display:flex;align-items:center;gap:10px;font-size:0.82rem;color:var(--muted);opacity:0;transform:translateX(-12px);transition:all 0.35s ease;}
    .ci.show{opacity:1;transform:none;color:var(--text);}
    .cd{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0;transition:all 0.3s;background:var(--surface2);}
    .ci.show .cd{background:var(--green);border-color:var(--green);color:#000;font-weight:800;}
    .progress-bar{width:100%;height:3px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:8px;}
    .progress-fill{height:100%;background:var(--green);border-radius:3px;width:0%;transition:width 3.5s linear;}
    .progress-label{font-size:0.72rem;color:var(--muted);margin-bottom:20px;}
    .btn{display:block;width:100%;background:var(--green);color:#000;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.9rem;padding:13px;border-radius:11px;text-decoration:none;transition:background 0.15s;border:none;cursor:pointer;margin-top:10px;}
    .btn:hover{background:var(--green-dim);}
    .btn-ghost{display:block;width:100%;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.85rem;padding:11px;border-radius:11px;text-decoration:none;border:1px solid var(--border);transition:all 0.15s;margin-top:8px;}
    .btn-ghost:hover{border-color:rgba(61,220,132,0.4);color:var(--text);}
  </style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <div class="card" id="card">
    <div class="logo">Whims<span>Games</span></div>
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Verifying…</h1>
    <p class="sub" id="msg">Confirming your email, just a moment.</p>
  </div>
  <script>
    // Particles
    const bg = document.getElementById('bg');
    for (let i=0;i<30;i++){
      const p=document.createElement('div'); p.className='particle';
      const sz=(1+Math.random()*3)+'px';
      p.style.cssText=`left:${Math.random()*100}vw;width:${sz};height:${sz};background:var(--green);animation-duration:${5+Math.random()*10}s;animation-delay:${Math.random()*10}s;opacity:0;`;
      bg.appendChild(p);
    }

    const SUPA_URL='https://rjrnqiklifurcqzvavtt.supabase.co';
    const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqcm5xaWtsaWZ1cmNxenZhdnR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTQ5OTEsImV4cCI6MjA4ODA3MDk5MX0.4DXwtSUQ7yA2aH-N2bEnobSi2gRbFw0BANdfgSfROx0';
    const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

    function showError(msg){
      document.getElementById('spinner').remove();
      const card=document.getElementById('card');
      const icon=document.createElement('div'); icon.className='icon-wrap error'; icon.textContent='✕';
      card.insertBefore(icon,document.getElementById('title'));
      document.getElementById('title').textContent='Verification failed';
      document.getElementById('msg').textContent=msg;
      const b1=document.createElement('a'); b1.href='login.html'; b1.className='btn'; b1.textContent='← Try signing in'; card.appendChild(b1);
      const b2=document.createElement('a'); b2.href='index.html'; b2.className='btn-ghost'; b2.textContent='Back to games'; card.appendChild(b2);
    }

    function showSuccess(username){
      document.getElementById('spinner').remove();
      const card=document.getElementById('card');
      const icon=document.createElement('div'); icon.className='icon-wrap success'; icon.innerHTML='✓';
      card.insertBefore(icon,document.getElementById('title'));
      document.getElementById('title').textContent="You're in!";
      document.getElementById('msg').innerHTML=username
        ? `Welcome to Whims Games, <span class="username">${username}</span>!`
        : 'Your email is verified. Your account is ready.';

      // Checklist
      const checks=document.createElement('div'); checks.className='checks';
      checks.innerHTML=`
        <div class="ci" id="c1"><div class="cd">✓</div>Email verified</div>
        <div class="ci" id="c2"><div class="cd">✓</div>Account created</div>
        <div class="ci" id="c3"><div class="cd">✓</div>Ready to play</div>`;
      card.appendChild(checks);
      setTimeout(()=>document.getElementById('c1').classList.add('show'),150);
      setTimeout(()=>document.getElementById('c2').classList.add('show'),350);
      setTimeout(()=>document.getElementById('c3').classList.add('show'),550);

      // Progress
      setTimeout(()=>{
        const pb=document.createElement('div'); pb.className='progress-bar';
        pb.innerHTML='<div class="progress-fill" id="fill"></div>';
        const pl=document.createElement('div'); pl.className='progress-label'; pl.textContent='Redirecting in 3 seconds…';
        card.appendChild(pb); card.appendChild(pl);
        requestAnimationFrame(()=>requestAnimationFrame(()=>{ document.getElementById('fill').style.width='100%'; }));
      },700);

      // Buttons
      setTimeout(()=>{
        const b1=document.createElement('a'); b1.href='index.html'; b1.className='btn'; b1.textContent='▶ Start playing'; card.appendChild(b1);
        const b2=document.createElement('a'); b2.href='profile.html'; b2.className='btn-ghost'; b2.textContent='View my profile'; card.appendChild(b2);
      },900);

      setTimeout(()=>{ window.location.href='index.html'; },4000);
    }

    async function verify(){
      const hash=window.location.hash.slice(1);
      const params=new URLSearchParams(hash);
      const access_token=params.get('access_token');
      const refresh_token=params.get('refresh_token');

      if(!access_token){
        showError('No verification token found. The link may have expired or already been used.');
        return;
      }

      try{
        // Set session using tokens from URL
        const {data,error}=await sb.auth.setSession({
          access_token,
          refresh_token: refresh_token||access_token
        });

        if(error||!data?.session){
          showError(error?.message||'Verification failed. Try signing in manually.');
          return;
        }

        const user=data.session.user;
        const meta=user?.user_metadata||{};
        const username=(meta.username||'').toLowerCase();
        const displayName=meta.display_name||meta.username||'';

        // Create profile row now that email is verified
        if(username){
          await sb.from('profiles').upsert({
            id: user.id,
            username,
            display_name: displayName,
            elo:1200, wins:0, losses:0, draws:0
          },{onConflict:'id',ignoreDuplicates:true});
        }

        showSuccess(displayName||username);

      }catch(err){
        showError('Something went wrong: '+err.message);
      }
    }

    verify();
  </script>
</body>
</html>
